<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景點觀光展覽資訊 - HW#4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        /* 讓標題和搜尋框排在同一列 */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        /* 分頁控制區塊樣式 */
        .pagination-controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* 表頭顏色稍微貼近投影片範例 */
        .table-success th { background-color: #00a859 !important; color: white; }
    </style>
</head>
<body>

    <div class="header-controls">
        <h1 class="m-0">景點觀光展覽資訊</h1>
        <input type="text" id="searchInput" class="form-control" style="width: 250px;" placeholder="搜尋展覽名稱..." onchange="searchData()">
    </div>

    <table id="csie" class="table table-striped table-hover mt-3">
        <thead>
            <tr class="table-success">
                <th>名稱</th>
                <th>地點</th>
                <th>票價</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <div class="pagination-controls">
        <button id="prevBtn" class="btn btn-outline-secondary" onclick="prevPage()">上一頁</button>
        <span id="pageInfo">1 / 1 頁</span>
        <button id="nextBtn" class="btn btn-outline-secondary" onclick="nextPage()">下一頁</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
