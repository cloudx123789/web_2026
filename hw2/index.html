<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>資工選課表 - 課程詳細資料</title>
<style>
    /* 原有表格樣式 */
    table {
        font-family: Arial, Helvetica, sans-serif;
        border-collapse: collapse;
        width: 100%;
    }
    td, th {
        border: 1px solid #ddd;
        padding: 6px;
    }
    tr:nth-child(even){background-color: #f2f2f2;}
    tr:hover {background-color: #ddd;}
    th {
        padding-top: 12px;
        padding-bottom: 12px;
        text-align: left;
        background-color: #04AA6D;
        color: white;
    }

    /* 新增：課程名稱點擊樣式 */
    .course-link {
        color: #0056b3;
        text-decoration: underline;
        cursor: pointer;
    }

    /* 新增：Popover (Modal) 背景樣式 */
    .popover-overlay {
        display: none; /* 預設隱藏 */
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5); /* 半透明背景 */
    }

    /* 新增：Popover 內容視窗樣式 */
    .popover-content {
        background-color: #fff;
        margin: 5% auto;
        padding: 20px;
        border-radius: 8px;
        width: 80%;
        height: 80%;
        position: relative;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* 關閉按鈕 */
    .close-btn {
        position: absolute;
        right: 20px;
        top: 10px;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        color: #aaa;
    }
    .close-btn:hover { color: #000; }

    /* iframe 樣式 */
    #course-frame {
        width: 100%;
        height: calc(100% - 30px);
        border: none;
    }
</style>
</head>

<body>

<h2>資工選課表</h2>

<table>
    <tr>
        <th>開課單位</th>
        <th>課程名稱</th>
        <th>授課教師</th>
    </tr>
    <tr>
        <td>資工系</td>
        <td class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2337')">物件導向軟體設計</td>
        <td>黃崇源</td>
    </tr>
    <tr>
        <td>資工系</td>
        <td class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2343')">編譯器設計</td>
        <td>吳齊人</td>
    </tr>
    <tr>
        <td>資工系</td>
        <td class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2338')">作業系統實務</td>
        <td>張哲維</td>
    </tr>
    <tr>
        <td>資工系</td>
        <td class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2346')">資料結構與演算法(2)</td>
        <td>趙一平</td>
    </tr>
    <tr>
        <td>資工系</td>
        <td class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2341')">平行程式設計</td>
        <td>李春良</td>
    </tr>
    <tr>
        <td>資工系</td>
        <td class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2342')">人工智慧</td>
        <td>魏志達</td>
    </tr>
</table>

<div id="coursePopover" class="popover-overlay">
    <div class="popover-content">
        <span class="close-btn" onclick="closePopover()">&times;</span>
        <iframe id="course-frame" src=""></iframe>
    </div>
</div>

<script>
    // 開啟彈窗並載入網址
    function openPopover(url) {
        const popover = document.getElementById('coursePopover');
        const frame = document.getElementById('course-frame');
        frame.src = url; // 設定 iframe 網址
        popover.style.display = 'block'; // 顯示彈窗
    }

    // 關閉彈窗
    function closePopover() {
        const popover = document.getElementById('coursePopover');
        const frame = document.getElementById('course-frame');
        popover.style.display = 'none'; // 隱藏彈窗
        frame.src = ''; // 清空 iframe 內容，節省資源並停止音訊/影片
    }

    // 點擊彈窗外部也可關閉
    window.onclick = function(event) {
        const popover = document.getElementById('coursePopover');
        if (event.target == popover) {
            closePopover();
        }
    }
</script>

</body>
</html>
